name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    env:
      RJ_ENABLE_VULKAN_VALIDATION: "1"

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Rust kur
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: MSVC ortamını ayarla
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build Rust orchestrator
        run: cargo build --release --verbose 2>&1
        working-directory: ${{ github.workspace }}

      - name: Verify Rust lib exists
        run: |
          if (!(Test-Path "target/release/reji_orchestrator.lib")) {
            Write-Host "ERROR: reji_orchestrator.lib not found!"
            Get-ChildItem target/release/ -ErrorAction SilentlyContinue
            exit 1
          }
          Write-Host "OK: reji_orchestrator.lib found"
        shell: pwsh

      - name: Install Google Test
        run: |
          git clone https://github.com/google/googletest.git
          cd googletest
          cmake -B build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          cmake --install build --prefix C:/gtest
        shell: cmd

      - name: CMake yapılandır
        run: cmake -B build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DGTEST_ROOT=C:/gtest -DRJ_VALIDATION=ON

      - name: C++ derle
        run: cmake --build build

      - name: FFI sınır testini çalıştır
        run: build\tests\test_ffi_boundary.exe

      - name: Rust testleri çalıştır
        run: cargo test

      - name: Validate Vulkan (headless)
        run: |
          set RJ_ENABLE_VULKAN_VALIDATION=1
          build\src\ui\reji_app.exe --headless --frames 10 2> vk_log.txt
          findstr "VUID" vk_log.txt && exit 1 || exit 0
        shell: cmd